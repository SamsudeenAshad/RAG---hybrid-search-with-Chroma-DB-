services:
  api:
    build: .
    container_name: chroma_rag_api
    ports:
      - "8010:8000"   # host 8010 -> container 8000 (8000 is taken on this host)
    env_file:
      - .env          # GOOGLE_API_KEY, CHROMA_API_KEY, TAVILY_API_KEY, model/tuning vars
    environment:
      # Override host-oriented URLs so they resolve on the compose network
      # (inside the container, "localhost" is the container itself).
      DATABASE_URL: postgresql://a2z:a2z@postgres:5432/chroma_rag
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      API_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:1.5.9
    container_name: chroma_rag_chroma
    ports:
      - "8800:8000"   # host 8800 -> container 8000 (8000 is taken on this host)
    volumes:
      - chroma_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: chroma_rag_postgres
    environment:
      POSTGRES_USER: a2z
      POSTGRES_PASSWORD: a2z
      POSTGRES_DB: chroma_rag
    ports:
      - "5442:5432"   # host 5442 to avoid conflicts
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a2z -d chroma_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  chroma_data:
