services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: a2z_qdrant
    ports:
      - "6533:6333"   # REST / dashboard (host 6533 to avoid conflicts)
      - "6534:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: a2z_postgres
    environment:
      POSTGRES_USER: a2z
      POSTGRES_PASSWORD: a2z
      POSTGRES_DB: a2z_hunter
    ports:
      - "5442:5432"   # host 5442 to avoid conflicts
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a2z -d a2z_hunter"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  qdrant_storage:
  pgdata:
